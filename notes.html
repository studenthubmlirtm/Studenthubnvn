<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes - MLRITM Student Hub</title>

<style>
body {
    font-family: Arial;
    margin: 0;
}

/* 🔙 Back Button */
.back-btn {
    position: fixed;
    top: 10px;
    left: 10px;
    background: black;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 50%;
    cursor: pointer;
}

/* Header */
header {
    text-align: center;
    padding: 15px;
}

nav a {
    margin: 0 10px;
    text-decoration: none;
}

/* 🔍 Search */
.search-box {
    width: 90%;
    max-width: 400px;
    margin: 15px auto;
    display: flex;
    border: 2px solid #ccc;
    border-radius: 8px;
    overflow: hidden;
}
.search-box input {
    flex: 1;
    padding: 10px;
    border: none;
}
.search-box span {
    padding: 10px;
    background: #eee;
}

/* 🔵 Upload */
.upload-box {
    width: 90%;
    max-width: 400px;
    margin: 20px auto;
    padding: 30px;
    background: blue;
    color: white;
    text-align: center;
    border-radius: 15px;
    cursor: pointer;
}

/* 📂 Files */
.file {
    width: 90%;
    max-width: 400px;
    margin: 10px auto;
    padding: 15px;
    background: #f1f1f1;
    border-radius: 10px;
}

/* Buttons */
.btn {
    margin: 5px;
    padding: 8px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.preview { background: green; color: white; }

/* ⬇️ blinking */
.download {
    animation: blink 1s infinite;
}
@keyframes blink {
    0% { background: blue; color: white; }
    50% { background: red; color: white; }
    100% { background: blue; color: white; }
}

.delete {
    background: red;
    color: white;
    display: block;
    margin: 10px auto;
}

/* Cards */
.cards {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    width: 250px;
    margin: 10px;
    padding: 15px;
    background: #eee;
    border-radius: 10px;
    text-align: center;
}
</style>

</head>

<body>

<header>
    <h1>📚 MLRITM Student Notes</h1>

    <nav>
        <a href="index.html">🏠 Home</a>
        <a href="ppts.html">📄 PPTs</a>
        <a href="chat.html">💬 Chat</a>
    </nav>
</header>

<div class="search-box">
    <input
        type="text"
        id="search"
        placeholder="Search Notes..."
    >
</div>

<div class="upload-box">

    <input
        type="text"
        id="studentName"
        placeholder="Your Name"
    >

    <br><br>

    <input
        type="file"
        id="fileInput"
        accept=".pdf,.ppt,.pptx,.doc,.docx"
    >

    <br><br>

    <button id="uploadBtn">
        Upload Note
    </button>

</div>

<hr>

<h2 align="center">
Uploaded Notes
</h2>

<div id="fileList">

Loading...

</div>

<footer>

© 2026 MLRITM Student Hub

</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>

</body>

    </html>
